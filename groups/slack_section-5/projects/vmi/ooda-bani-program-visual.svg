<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 780" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#90A4AE" flood-opacity="0.25"/>
    </filter>
    <filter id="wheel-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#607D8B" flood-opacity="0.25"/>
    </filter>
    <marker id="arr-fwd" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 1 L 10 6 L 0 11 z" fill="#546E7A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="780" fill="#FAFBFC" rx="8"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" fill="#1a2332" font-size="22" font-weight="700" letter-spacing="0.5">OODA × BANI+ Leadership Development Framework</text>
  <text x="480" y="58" text-anchor="middle" fill="#90A4AE" font-size="12" letter-spacing="2">VMI ENGAGEMENT METHODOLOGY</text>

  <!-- Three layers legend -->
  <g transform="translate(35, 74)">
    <rect x="0" y="0" width="155" height="60" rx="6" fill="#fff" stroke="#CFD8DC" stroke-width="1"/>
    <rect x="12" y="10" width="10" height="10" rx="2" fill="#ECEFF1" stroke="#B0BEC5" stroke-width="0.5"/>
    <text x="28" y="19" fill="#90A4AE" font-size="9.5">BANI — The Terrain</text>
    <rect x="12" y="26" width="10" height="10" rx="2" fill="#1976D2" opacity="0.7"/>
    <text x="28" y="35" fill="#455A64" font-size="9.5">BANI+ — Capacities</text>
    <rect x="12" y="42" width="10" height="10" rx="2" fill="#37474F"/>
    <text x="28" y="51" fill="#263238" font-size="9.5" font-weight="600">OODA — Method</text>
  </g>

  <!-- ========== BANI TERRAIN LABELS — prominent, outside the wheel with breathing room ========== -->
  <!-- These sit in the four corners of the wheel area, well clear of the ring -->
  <text x="280" y="105" text-anchor="middle" fill="#546E7A" font-size="15" font-weight="700" letter-spacing="4">ANXIOUS</text>
  <text x="680" y="105" text-anchor="middle" fill="#546E7A" font-size="15" font-weight="700" letter-spacing="4">NON-LINEAR</text>
  <text x="680" y="540" text-anchor="middle" fill="#546E7A" font-size="15" font-weight="700" letter-spacing="4">BRITTLE</text>
  <text x="280" y="540" text-anchor="middle" fill="#546E7A" font-size="15" font-weight="700" letter-spacing="3">INCOMPREHENSIBLE</text>

  <!-- Dashed connectors from BANI labels to the wheel ring -->
  <line x1="280" y1="112" x2="355" y2="168" stroke="#CFD8DC" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="680" y1="112" x2="605" y2="168" stroke="#CFD8DC" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="680" y1="530" x2="605" y2="476" stroke="#CFD8DC" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="280" y1="530" x2="355" y2="476" stroke="#CFD8DC" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ========== THE WHEEL — tighter radius ========== -->
  <g transform="translate(480, 320)" filter="url(#wheel-shadow)">

    <!-- Colored quadrant arcs — 60px stroke, radius 160 (tighter) -->
    <!-- Left-top (180°→270°) = OBSERVE / Blue -->
    <path d="M -160 0 A 160 160 0 0 1 0 -160" fill="none" stroke="#1976D2" stroke-width="60" stroke-linecap="butt" opacity="0.85"/>
    <!-- Top-right (270°→360°) = ORIENT / Purple -->
    <path d="M 0 -160 A 160 160 0 0 1 160 0" fill="none" stroke="#7B1FA2" stroke-width="60" stroke-linecap="butt" opacity="0.85"/>
    <!-- Right-bottom (0°→90°) = DECIDE / Orange -->
    <path d="M 160 0 A 160 160 0 0 1 0 160" fill="none" stroke="#E65100" stroke-width="60" stroke-linecap="butt" opacity="0.85"/>
    <!-- Bottom-left (90°→180°) = ACT / Green -->
    <path d="M 0 160 A 160 160 0 0 1 -160 0" fill="none" stroke="#2E7D32" stroke-width="60" stroke-linecap="butt" opacity="0.85"/>

    <!-- Clockwise flow arrows — white polygons on the ring -->
    <!-- Top: Observe → Orient -->
    <path d="M -50 -158 Q 0 -178 40 -158" fill="none" stroke="#fff" stroke-width="3.5" opacity="0.85"/>
    <polygon points="44,-165 54,-158 44,-151" fill="#fff" opacity="0.85"/>
    <!-- Right: Orient → Decide -->
    <path d="M 158 -50 Q 178 0 158 40" fill="none" stroke="#fff" stroke-width="3.5" opacity="0.85"/>
    <polygon points="165,44 158,54 151,44" fill="#fff" opacity="0.85"/>
    <!-- Bottom: Decide → Act -->
    <path d="M 50 158 Q 0 178 -40 158" fill="none" stroke="#fff" stroke-width="3.5" opacity="0.85"/>
    <polygon points="-44,165 -54,158 -44,151" fill="#fff" opacity="0.85"/>
    <!-- Left: Act → Observe -->
    <path d="M -158 50 Q -178 0 -158 -40" fill="none" stroke="#fff" stroke-width="3.5" opacity="0.85"/>
    <polygon points="-165,-44 -158,-54 -151,-44" fill="#fff" opacity="0.85"/>

    <!-- Phase labels — solidly on the colored arcs -->
    <!-- OBSERVE (top-left, ~225°) → (-113, -113) -->
    <text x="-113" y="-118" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" letter-spacing="1.5">OBSERVE</text>
    <text x="-113" y="-103" text-anchor="middle" fill="#BBDEFB" font-size="10" font-style="italic">Attentive</text>

    <!-- ORIENT (top-right, ~315°) → (113, -113) -->
    <text x="113" y="-118" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" letter-spacing="1.5">ORIENT</text>
    <text x="113" y="-103" text-anchor="middle" fill="#E1BEE7" font-size="10" font-style="italic">Neuroflexible</text>

    <!-- DECIDE (bottom-right, ~45°) → (113, 113) -->
    <text x="113" y="110" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" letter-spacing="1.5">DECIDE</text>
    <text x="113" y="125" text-anchor="middle" fill="#FFE0B2" font-size="10" font-style="italic">Bendable</text>

    <!-- ACT (bottom-left, ~135°) → (-113, 113) -->
    <text x="-113" y="110" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" letter-spacing="1.5">ACT</text>
    <text x="-113" y="125" text-anchor="middle" fill="#C8E6C9" font-size="10" font-style="italic">Interconnected</text>

    <!-- CENTER HUB -->
    <circle cx="0" cy="0" r="55" fill="#fff" stroke="#CFD8DC" stroke-width="2"/>
    <circle cx="0" cy="0" r="46" fill="#F5F5F5" stroke="none"/>
    <text x="0" y="-8" text-anchor="middle" fill="#263238" font-size="17" font-weight="800" letter-spacing="2">OODA</text>
    <text x="0" y="10" text-anchor="middle" fill="#78909C" font-size="10" letter-spacing="1">LOOP</text>
    <!-- Spinning arrow -->
    <path d="M -11 20 A 14 14 0 1 1 11 20" fill="none" stroke="#546E7A" stroke-width="1.8"/>
    <polygon points="9,17 11,20 7,21" fill="#546E7A"/>
    <text x="0" y="36" text-anchor="middle" fill="#90A4AE" font-size="7" font-style="italic">each cycle compounds</text>
  </g>

  <!-- ========== ACTIVITY CARDS ========== -->

  <!-- OBSERVE (left) -->
  <g filter="url(#card-shadow)">
    <rect x="28" y="155" width="168" height="120" rx="8" fill="#fff" stroke="#1976D2" stroke-width="1.5"/>
    <rect x="28" y="155" width="168" height="28" rx="8" fill="#1976D2"/>
    <rect x="28" y="173" width="168" height="10" fill="#1976D2"/>
    <text x="112" y="174" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" letter-spacing="1">OBSERVE</text>
    <text x="44" y="204" fill="#455A64" font-size="9.5">• Assessment survey</text>
    <text x="44" y="220" fill="#455A64" font-size="9.5">• Engagement sessions</text>
    <text x="44" y="236" fill="#455A64" font-size="9.5">• Institutional data review</text>
    <text x="44" y="252" fill="#455A64" font-size="9.5">• Stakeholder scanning</text>
  </g>
  <line x1="196" y1="215" x2="325" y2="240" stroke="#1976D2" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- ORIENT (right) -->
  <g filter="url(#card-shadow)">
    <rect x="764" y="155" width="168" height="120" rx="8" fill="#fff" stroke="#7B1FA2" stroke-width="1.5"/>
    <rect x="764" y="155" width="168" height="28" rx="8" fill="#7B1FA2"/>
    <rect x="764" y="173" width="168" height="10" fill="#7B1FA2"/>
    <text x="848" y="174" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" letter-spacing="1">ORIENT</text>
    <text x="780" y="204" fill="#455A64" font-size="9.5">• BANI+ lens interpretation</text>
    <text x="780" y="220" fill="#455A64" font-size="9.5">• Benchmarking</text>
    <text x="780" y="236" fill="#455A64" font-size="9.5">• Gap analysis</text>
    <text x="780" y="252" fill="#455A64" font-size="9.5">• Mental model reframing</text>
  </g>
  <line x1="764" y1="215" x2="635" y2="240" stroke="#7B1FA2" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- DECIDE (right-bottom) -->
  <g filter="url(#card-shadow)">
    <rect x="764" y="370" width="168" height="120" rx="8" fill="#fff" stroke="#E65100" stroke-width="1.5"/>
    <rect x="764" y="370" width="168" height="28" rx="8" fill="#E65100"/>
    <rect x="764" y="388" width="168" height="10" fill="#E65100"/>
    <text x="848" y="389" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" letter-spacing="1">DECIDE</text>
    <text x="780" y="419" fill="#455A64" font-size="9.5">• Intervention priorities</text>
    <text x="780" y="435" fill="#455A64" font-size="9.5">• Development roadmap</text>
    <text x="780" y="451" fill="#455A64" font-size="9.5">• Advisory group alignment</text>
    <text x="780" y="467" fill="#455A64" font-size="9.5">• Adaptive commitments</text>
  </g>
  <line x1="764" y1="430" x2="635" y2="400" stroke="#E65100" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- ACT (left-bottom) -->
  <g filter="url(#card-shadow)">
    <rect x="28" y="370" width="168" height="120" rx="8" fill="#fff" stroke="#2E7D32" stroke-width="1.5"/>
    <rect x="28" y="370" width="168" height="28" rx="8" fill="#2E7D32"/>
    <rect x="28" y="388" width="168" height="10" fill="#2E7D32"/>
    <text x="112" y="389" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" letter-spacing="1">ACT</text>
    <text x="44" y="419" fill="#455A64" font-size="9.5">• Coaching delivery</text>
    <text x="44" y="435" fill="#455A64" font-size="9.5">• Cohort interventions</text>
    <text x="44" y="451" fill="#455A64" font-size="9.5">• Network activation</text>
    <text x="44" y="467" fill="#455A64" font-size="9.5">• Feedback generation</text>
  </g>
  <line x1="196" y1="430" x2="325" y2="400" stroke="#2E7D32" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- ========== YEAR TIMELINE ========== -->
  <g transform="translate(0, 580)">
    <!-- Ground line -->
    <line x1="60" y1="30" x2="900" y2="30" stroke="#B0BEC5" stroke-width="2"/>
    <path d="M 880 30 L 905 30" stroke="#546E7A" stroke-width="2.5" marker-end="url(#arr-fwd)"/>

    <!-- Year 1 -->
    <g transform="translate(170, 4)">
      <circle cx="0" cy="0" r="26" fill="none" stroke="#37474F" stroke-width="3" opacity="0.7"/>
      <circle cx="0" cy="0" r="3" fill="#37474F"/>
      <line x1="0" y1="-26" x2="0" y2="26" stroke="#37474F" stroke-width="1" opacity="0.3"/>
      <line x1="-26" y1="0" x2="26" y2="0" stroke="#37474F" stroke-width="1" opacity="0.3"/>
      <text x="0" y="52" text-anchor="middle" fill="#1a2332" font-size="12" font-weight="700">Year 1</text>
      <text x="0" y="66" text-anchor="middle" fill="#78909C" font-size="9">First Full Cycle</text>
      <text x="0" y="78" text-anchor="middle" fill="#B0BEC5" font-size="8">Base Contract</text>
    </g>

    <!-- Year 2 -->
    <g transform="translate(380, 10)">
      <circle cx="0" cy="0" r="20" fill="none" stroke="#37474F" stroke-width="3" opacity="0.7"/>
      <circle cx="0" cy="0" r="3" fill="#37474F"/>
      <line x1="0" y1="-20" x2="0" y2="20" stroke="#37474F" stroke-width="1" opacity="0.3"/>
      <line x1="-20" y1="0" x2="20" y2="0" stroke="#37474F" stroke-width="1" opacity="0.3"/>
      <line x1="-28" y1="20" x2="-38" y2="20" stroke="#B0BEC5" stroke-width="1.5" opacity="0.4"/>
      <line x1="-26" y1="14" x2="-34" y2="12" stroke="#B0BEC5" stroke-width="1.2" opacity="0.3"/>
      <text x="0" y="46" text-anchor="middle" fill="#1a2332" font-size="12" font-weight="700">Year 2</text>
      <text x="0" y="60" text-anchor="middle" fill="#78909C" font-size="9">Faster Loops</text>
      <text x="0" y="72" text-anchor="middle" fill="#B0BEC5" font-size="8">Renewal 1</text>
    </g>

    <!-- Year 3 -->
    <g transform="translate(580, 15)">
      <circle cx="0" cy="0" r="15" fill="none" stroke="#37474F" stroke-width="3" opacity="0.7"/>
      <circle cx="0" cy="0" r="3" fill="#37474F"/>
      <line x1="0" y1="-15" x2="0" y2="15" stroke="#37474F" stroke-width="1" opacity="0.3"/>
      <line x1="-15" y1="0" x2="15" y2="0" stroke="#37474F" stroke-width="1" opacity="0.3"/>
      <line x1="-22" y1="15" x2="-34" y2="15" stroke="#B0BEC5" stroke-width="1.5" opacity="0.5"/>
      <line x1="-20" y1="8" x2="-30" y2="5" stroke="#B0BEC5" stroke-width="1.2" opacity="0.35"/>
      <line x1="-20" y1="2" x2="-28" y2="-3" stroke="#B0BEC5" stroke-width="1" opacity="0.25"/>
      <text x="0" y="41" text-anchor="middle" fill="#1a2332" font-size="12" font-weight="700">Year 3</text>
      <text x="0" y="55" text-anchor="middle" fill="#78909C" font-size="9">Near Real-Time</text>
      <text x="0" y="67" text-anchor="middle" fill="#B0BEC5" font-size="8">Renewal 2</text>
    </g>

    <!-- Year 4 -->
    <g transform="translate(770, 19)">
      <circle cx="0" cy="0" r="11" fill="none" stroke="#37474F" stroke-width="3" opacity="0.7"/>
      <circle cx="0" cy="0" r="3" fill="#37474F"/>
      <line x1="0" y1="-11" x2="0" y2="11" stroke="#37474F" stroke-width="1" opacity="0.3"/>
      <line x1="-11" y1="0" x2="11" y2="0" stroke="#37474F" stroke-width="1" opacity="0.3"/>
      <line x1="-18" y1="11" x2="-32" y2="11" stroke="#B0BEC5" stroke-width="1.5" opacity="0.5"/>
      <line x1="-16" y1="5" x2="-28" y2="2" stroke="#B0BEC5" stroke-width="1.5" opacity="0.4"/>
      <line x1="-16" y1="-1" x2="-26" y2="-6" stroke="#B0BEC5" stroke-width="1.2" opacity="0.3"/>
      <line x1="-14" y1="-6" x2="-24" y2="-12" stroke="#B0BEC5" stroke-width="1" opacity="0.2"/>
      <text x="0" y="37" text-anchor="middle" fill="#1a2332" font-size="12" font-weight="700">Year 4</text>
      <text x="0" y="51" text-anchor="middle" fill="#78909C" font-size="9">Self-Sustaining</text>
      <text x="0" y="63" text-anchor="middle" fill="#B0BEC5" font-size="8">Renewal 3</text>
    </g>
  </g>

  <!-- ========== BOYD QUOTE — prominent, with breathing room ========== -->
  <line x1="300" y1="700" x2="660" y2="700" stroke="#CFD8DC" stroke-width="1"/>
  <text x="480" y="728" text-anchor="middle" fill="#37474F" font-size="15" font-style="italic" letter-spacing="0.3">"The side that cycles faster wins."</text>
  <text x="480" y="750" text-anchor="middle" fill="#78909C" font-size="11" font-weight="600" letter-spacing="2">— JOHN BOYD</text>

</svg>